name: 'nyc_taxi'
version: '1.0.0'
config-version: 2

profile: 'nyc_taxi'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Parametrised duration bounds — used by the intermediate filter AND the generic
# value_within_range test, so the rule lives in exactly one place.
vars:
  min_trip_duration_minutes: 1
  max_trip_duration_minutes: 180

models:
  nyc_taxi:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  nyc_taxi:
    +schema: staging
    taxi_zone_lookup:
      +column_types:
        LocationID: integer
