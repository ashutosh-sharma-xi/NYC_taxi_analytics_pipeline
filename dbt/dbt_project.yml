name: 'nyc_taxi'
version: '1.0.0'
config-version: 2

profile: 'nyc_taxi'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Parametrised duration bounds — used by the intermediate filter AND the generic
# value_within_range test, so the rule lives in exactly one place.
vars:
  min_trip_duration_minutes: 1
  max_trip_duration_minutes: 180
  trip_year: 2023            # drop rows whose pickup year isn't this (corrupt meter clocks)

# Master switch for the dbt build, read from the MODELS_ENABLED environment
# variable (default 'true'). Every model's `enabled:` in its schema.yml keys off
# it, so one env var skips ALL models — e.g. on the daily ingestion-only run:
#   MODELS_ENABLED=false dbt build      (bash)   -> models skipped
#   $env:MODELS_ENABLED='false'; dbt build (PowerShell)
# Leave it unset (or 'true') for the weekly full build.

# Per-model materialization, strategy, tags and the enable flag now live in each
# layer's schema.yml (single place to read a model's config). Only the output
# schema per layer is set here.
models:
  nyc_taxi:
    staging:
      +schema: staging
    intermediate:
      +schema: intermediate
    marts:
      +schema: marts

seeds:
  nyc_taxi:
    +schema: staging
    taxi_zone_lookup:
      +column_types:
        LocationID: integer
