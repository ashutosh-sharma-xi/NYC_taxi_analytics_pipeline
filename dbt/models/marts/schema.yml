version: 2

models:
  - name: fct_trips
    description: "Fact table of all valid, enriched taxi trips. Grain = one trip. Incremental on pickup_datetime."
    config:
      materialized: incremental
      unique_key: trip_id
      on_schema_change: sync_all_columns
      tags: ['marts']
      enabled: "{{ env_var('MODELS_ENABLED', 'true') | lower == 'true' }}"
    columns:
      - name: trip_id
        description: "Surrogate primary key, deduped in this model."
        tests:
          - not_null
          - unique
      - name: pickup_location_id
        description: "FK to dim_zones.location_id."
        tests:
          - not_null
          - relationships:
              to: ref('dim_zones')
              field: location_id
      - name: trip_duration_minutes
        description: "Trip length in minutes; must sit within the configured bounds."
        tests:
          - value_within_range:
              min_value: "{{ var('min_trip_duration_minutes') }}"
              max_value: "{{ var('max_trip_duration_minutes') }}"
      - name: fare_amount
        tests:
          - not_null

  - name: dim_zones
    description: "Taxi zone dimension. One row per zone."
    config:
      materialized: table
      tags: ['marts']
      enabled: "{{ env_var('MODELS_ENABLED', 'true') | lower == 'true' }}"
    columns:
      - name: location_id
        tests:
          - not_null
          - unique

  - name: agg_daily_revenue
    description: "Daily revenue aggregation."
    config:
      materialized: table
      tags: ['marts']
      enabled: "{{ env_var('MODELS_ENABLED', 'true') | lower == 'true' }}"
    columns:
      - name: revenue_date
        tests:
          - not_null
          - unique

  - name: agg_zone_performance
    description: "Per pickup-zone performance with revenue rank and high-volume flag."
    config:
      materialized: table
      tags: ['marts']
      enabled: "{{ env_var('MODELS_ENABLED', 'true') | lower == 'true' }}"
    columns:
      - name: pickup_location_id
        tests:
          - not_null
          - unique
